<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestion Utilisateurs</title>

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      margin: 0;
      padding: 20px;
      color: #333;
    }

    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h1 {
      text-align: center;
      color: #444;
    }

    h2 {
      margin-top: 30px;
      color: #555;
    }

    .user-form {
      background: #f9f9f9;
      padding: 20px;
      border-radius: 10px;
      box-shadow: inset 0 0 5px rgba(0,0,0,0.05);
    }

    .user-form input {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      border-radius: 6px;
      border: 1px solid #ccc;
      transition: 0.2s;
    }

    .user-form input:focus {
      border-color: #667eea;
      outline: none;
      box-shadow: 0 0 5px rgba(102,126,234,0.5);
    }

    button {
      background: #667eea;
      color: white;
      padding: 10px 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #5a67d8;
    }

    #load-users {
      margin-top: 10px;
    }

    #users-list {
      margin-top: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 15px;
    }

    .user-card {
      background: #fff;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
      transition: transform 0.2s;
    }

    .user-card:hover {
      transform: translateY(-5px);
    }

    .user-card p {
      margin: 5px 0;
    }

    .id {
      font-size: 12px;
      color: gray;
    }

  </style>
</head>

<body>
  <div class="container">
    <h1>👤 Gestion des Utilisateurs</h1>

    <div class="user-form">
      <h2>➕ Ajouter un utilisateur</h2>
      <form id="add-user-form">
        <input type="text" id="nom" placeholder="Nom" required>
        <input type="text" id="prenom" placeholder="Prénom" required>
        <input type="number" id="age" placeholder="Âge">
        <button type="submit">Ajouter</button>
      </form>
    </div>

    <h2>📋 Liste des utilisateurs</h2>
    <button id="load-users">Charger les utilisateurs</button>

    <div id="users-list"></div>
  </div>

  <script>
    document.getElementById('load-users').addEventListener('click', async () => {
      try {
        const response = await fetch('/api/users');
        const users = await response.json();

        const usersList = document.getElementById('users-list');
        usersList.innerHTML = '';

        users.forEach(user => {
          const userDiv = document.createElement('div');
          userDiv.className = 'user-card';
          userDiv.innerHTML = `
            <p><strong>${user.prenom} ${user.nom}</strong></p>
            <p>🎂 ${user.age} ans</p>
            <p class="id">ID: ${user.id}</p>
          `;
          usersList.appendChild(userDiv);
        });

      } catch (error) {
        console.error('Erreur:', error);
      }
    });

    document.getElementById('add-user-form').addEventListener('submit', async (e) => {
      e.preventDefault();

      const nom = document.getElementById('nom').value;
      const prenom = document.getElementById('prenom').value;
      const age = parseInt(document.getElementById('age').value) || 0;

      try {
        const response = await fetch('/api/users', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ nom, prenom, age })
        });

        const newUser = await response.json();
        alert(`Utilisateur ajouté avec ID: ${newUser.id}`);

        document.getElementById('add-user-form').reset();
        document.getElementById('load-users').click();

      } catch (error) {
        console.error('Erreur:', error);
      }
    });
  </script>
</body>
</html>
